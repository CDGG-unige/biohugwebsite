<script>
(function () {
  var path = window.location.pathname;

  /* ── URL mapping between languages ── */
  function getFrUrl(p) {
    if (p.startsWith('/en/')) {
      var sub = p.slice(4);
      if (!sub || sub === 'index.html') return '/';
      return '/fr/' + sub;
    }
    return p; // already French or root
  }

  function getEnUrl(p) {
    if (p === '/' || p === '/index.html') return '/en/';
    if (p.startsWith('/fr/')) {
      var sub = p.slice(4);
      if (!sub || sub === 'index.html') return '/en/';
      return '/en/' + sub;
    }
    return p; // already English
  }

  /* ── Left nav items for English pages ── */
  var enGroups = [
    { text: 'For patients', items: [
      { text: 'What is BioHUG?',   href: '/en/patients/index.html' },
      { text: 'BioHUG FAQs',       href: '/en/patients/faqs.html' },
      { text: 'BioHUG Consent',    href: '/en/patients/consent.html' },
      { text: 'Use of samples',    href: '/en/patients/useofsamples.html' }
    ]},
    { text: 'For researchers', items: [
      { text: 'Description of BioHUG', href: '/en/researchers/index.html' },
      { text: 'How to use BioHUG',     href: '/en/researchers/howtouse.html' },
      { text: 'Governance',            href: '/en/researchers/governance.html' }
    ]},
    { text: 'The team', items: [
      { text: 'Meet the BioHUG team', href: '/en/team.html' }
    ]},
    { text: 'Studies', items: [
      { text: 'BioHUG Studies', href: '/en/studies.html' },
      { text: 'CALIBRATE',      href: '/en/study_calibrate.html' }
    ]}
  ];

  function buildLeftNav(groups) {
    return groups.map(function (g, i) {
      var id = 'nav-en-' + i;
      var subs = g.items.map(function (s) {
        return '<li><a class="dropdown-item" href="' + s.href + '">' + s.text + '</a></li>';
      }).join('');
      return '<li class="nav-item dropdown">' +
        '<a class="nav-link dropdown-toggle" id="' + id + '" href="#" role="button" ' +
        'data-bs-toggle="dropdown" aria-expanded="false">' + g.text + '</a>' +
        '<ul class="dropdown-menu" aria-labelledby="' + id + '">' + subs + '</ul>' +
        '</li>';
    }).join('');
  }

  function run() {
    /* Swap left nav on English pages */
    if (path.indexOf('/en/') !== -1) {
      var nav = document.getElementById('navbar-nav') ||
                document.querySelector('#navbarCollapse ul.me-auto');
      if (nav) nav.innerHTML = buildLeftNav(enGroups);
    }

    /* Update language button hrefs on every page */
    document.querySelectorAll('.navbar-nav a').forEach(function (a) {
      var t = a.textContent.trim();
      if (t.indexOf('🇬🇧') !== -1) a.href = getEnUrl(path);
      else if (t.indexOf('🇫🇷') !== -1) a.href = getFrUrl(path);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', run);
  } else {
    run();
  }
})();
</script>
