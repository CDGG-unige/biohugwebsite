project:
  type: website
  output-dir: _site
  


execute:
  freeze: auto

website:
  site-url: https://cdgg-unige.github.io/biohugwebsite/
  repo-url: https://github.com/CDGG-unige/biohugwebsite/
  title: "BioHUG"
  description: "BioHUG is the biobank of the Geneva University Hospitals (HUG), supporting clinical and translational research."
  favicon: images/DNAletters.jpg
  open-graph:
    title: "BioHUG — Biobank of the Geneva University Hospitals"
    description: "A biobank supporting clinical and translational research at HUG."
    image: images/og-preview.png
  twitter-card:
    title: "BioHUG"
    description: "A biobank supporting clinical and translational research at HUG."
    image: images/og-preview.png

  navbar:
    left:
      - text: "Pour les patients"
        menu:
          - text: "Qu'est-ce que BioHUG ?"
            href: /fr/patients/index.html
          - text: "FAQ BioHUG"
            href: /fr/patients/faqs.html
          - text: "Consentement BioHUG"
            href: /fr/patients/consent.html
          - text: "Utilisation des échantillons"
            href: /fr/patients/useofsamples.html
      - text: "Pour les chercheurs"
        menu:
          - text: "Description de BioHUG"
            href: /fr/researchers/index.html
          - text: "Comment utiliser BioHUG"
            href: /fr/researchers/howtouse.html
          - text: "Governance"
            href: /fr/researchers/governance.html
      - text: "L'équipe"
        menu:
          - text: "Rencontrez l'équipe BioHUG"
            href: /fr/team.html
      - text: "Études"
        menu:
          - text: "Études BioHUG"
            href: /fr/studies.html
          - text: "CALIBRATE"
            href: /fr/study_calibrate.html

    right:
      - text: "🇫🇷 Français"
        href: /
      - text: "🇬🇧 English"
        href: /en/

  page-footer:
    left: |
      <a href="https://www.hug.ch" target="_blank">
        <img src="/images/logoHUG.jpg" alt="HUG logo" height="120"/>
      </a>
    center: |
      <a href="/">
        <img src="/images/LOGO_FONDATION_V.jpg" alt="BioHUG logo" height="70"/>
      </a>
    right: |
      <a href="https://www.unige.ch/medecine/" target="_blank">
        <img src="/images/bandeau_web-homepage-150.jpg" alt="University of Geneva logo" height="70"/>
      </a>

format:
  html:
    lang: fr
    include-after-body: _navbar-lang.html
    theme:
      light:
        - flatly
        - custom.scss
      dark:
        - darkly
        - custom.scss
    toc: true
    toc-depth: 3
    smooth-scroll: true
    anchor-sections: true
    link-external-icon: true
    link-external-newwindow: true
    include-in-header:
      - text: |
          <script async src="https://www.googletagmanager.com/gtag/js?id=G-XF2D87G6XM5"></script>
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-XF2D87G6XM5');
          </script>
    
    